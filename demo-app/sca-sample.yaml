apiVersion: devsecops.licenta.ro/v1
kind: SupplyChainAttestation
metadata:
  name: demo-app-security-policy
spec:
  sourceValidation:
    enforceCosign: true
    trustedIssuers:
      - https://github.com/SabinGhost19/vulfastapi/.github/workflows/ci-cd.yaml@refs/heads/main
  provenance:
    requireVoucher: true
    enforceHmacChain: true
    minSlsaLevel: 3
    trustedRepositories:
      - SabinGhost19/vulfastapi
  vulnerabilityPolicy:
    maxAllowedSeverity: High
    failOnFixable: true
  sbomPolicy:
    enforceSBOM: true
    forbiddenPackages:
      - name: log4j
        maxVersion: "2.15.0"
  policyBinding:
    enabled: true
    requireAttestationType: https://devsecops.licenta.ro/attestations/custom-zta-policy/v1
  strictManifestHash:
    enabled: true
    enforcementAction: Reject
  runtimeEnforcement:
    enabled: true
    onPolicyDrift: Isolate
    onVulnerabilityFound: Alert
